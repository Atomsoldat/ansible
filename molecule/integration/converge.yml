---
# Integration test that mirrors the initial_install.sh role ordering.
# TODO: reduce number of excluded roles
# Skipped roles:
#   - third_party_software / homebrew: downloads large binaries, needs network + time
#   - nix_setup: needs nix installed
#   - nas-storage: needs NFS / real mounts
#   - syncthing: needs systemd user services
#   - nvidia: needs real hardware
#   - homedir_setup: needs SSH key + git remote
#   - fonts: needs rsync between host and container
- name: Integration test
  hosts: all
  gather_facts: true
  vars:
    # Skip bundle loading; use a small inline subset to keep tests fast
    software_bundles: []
    test_generic_packages:
      jq:
      tmux:
      git:
      wget:
    test_special_packages:
      Debian: {}
      Ubuntu: {}
      Archlinux: {}
    test_generic_blacklist: {}
    test_special_blacklist:
      Debian: {}
      Ubuntu: {}
      Archlinux: {}
  pre_tasks:
    - name: Create prerequisite groups
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      become: true
      loop:
        - docker
        - linuxbrew
  roles:
    - role: essential_packages
    - role: repo_setup
    - role: packaged_software
    - role: scripts
    - role: config
    - role: time
