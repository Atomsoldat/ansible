---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: debian13
    image: docker.io/geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
  - name: ubuntu2604
    image: docker.io/geerlingguy/docker-ubuntu2604-ansible:latest
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: "${MOLECULE_PROJECT_DIRECTORY}/roles/"
  inventory:
    links:
      # use the group_vars used by the actual hosts
      group_vars: ../../group_vars

verifier:
  name: ansible
