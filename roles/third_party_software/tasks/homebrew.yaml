---
- name: Aggregate homebrew taps from all bundles
  ansible.builtin.set_fact:
    __agg_homebrew_taps: "{{ __agg_homebrew_taps | default([]) + lookup('vars', item) }}"
  loop: "{{ query('varnames', '.+_homebrew_taps$') }}"

- name: Aggregate homebrew packages from all bundles
  ansible.builtin.set_fact:
    __agg_homebrew_packages: "{{ __agg_homebrew_packages | default([]) + lookup('vars', item) }}"
  loop: "{{ query('varnames', '.+_homebrew_packages$') }}"

- name: Tap required Homebrew repositories
  community.general.homebrew_tap:
    name: "{{ item }}"
  with_items: "{{ __agg_homebrew_taps }}"
  when: __agg_homebrew_taps | length > 0

- name: Install homebrew packages
  community.general.homebrew:
    name: "{{ __agg_homebrew_packages }}"
    update_homebrew: true
    upgrade_all: true
  # PATH does not contain the homebrew bin dir at this point yet, that comes from the user's config
  environment:
    PATH: /home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}
    # TODO: this disables the bubblewrap sandboxing for source-builds in homebrew
    # we ran into trouble with this on ubuntu, because ubuntu comes with an apparmor profile
    # for its own bwrap binary, but this is apparently not applied to the bwrap used by homebrew
    # we could look into that, because security hardenining is worthwhile to know
    # but that is a rabbit hole for another day
    HOMEBREW_NO_SANDBOX_LINUX: 1
  when: __agg_homebrew_packages | length > 0
