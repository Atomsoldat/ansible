---
entertainment_flatpaks:
  - identifier: org.prismlauncher.PrismLauncher
    alias: prismlauncher
    command: "flatpak run org.prismlauncher.PrismLauncher $@"
  - identifier: com.github.Matoking.protontricks
    alias: protontricks
    command: flatpak run com.github.Matoking.protontricks
  - identifier: org.telegram.desktop
    alias: telegram
    command: "flatpak run org.telegram.desktop $@"
  - identifier: com.discordapp.Discord
    alias: discord
    command: "flatpak run com.discordapp.Discord $@"
