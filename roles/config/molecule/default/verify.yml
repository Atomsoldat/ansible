---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check gruvbox theme exists
      ansible.builtin.stat:
        path: /usr/share/xfce4/terminal/colorschemes/gruvbox-dark.theme
      register: gruvbox_result

    - name: Assert gruvbox theme exists
      ansible.builtin.assert:
        that: gruvbox_result.stat.exists
        fail_msg: "Gruvbox theme was not installed"

    - name: Check nobeep.conf exists
      ansible.builtin.stat:
        path: /etc/modprobe.d/nobeep.conf
      register: nobeep_result

    - name: Assert nobeep.conf exists
      ansible.builtin.assert:
        that: nobeep_result.stat.exists
        fail_msg: "nobeep.conf was not installed"

    - name: Check custom desktop shortcuts config exists
      ansible.builtin.stat:
        path: /etc/X11/Xsession.d/99_custom_desktop_shortcuts
      register: shortcuts_result

    - name: Assert custom desktop shortcuts config exists
      ansible.builtin.assert:
        that: shortcuts_result.stat.exists
        fail_msg: "Custom desktop shortcuts config was not installed"

    - name: "Check user {{ target_user }} exists"
      ansible.builtin.command:
        cmd: "id {{ target_user }}"
      changed_when: false
