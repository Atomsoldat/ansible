---
- name: Perform bare checkout of cfg-files git repo
  ansible.builtin.git:
    repo: "https://github.com/Atomsoldat/cfg-files.git"
    accept_newhostkey: true
    bare: true
    recursive: true
    update: true
    dest: "{{ target_home }}/.cfg.git"
  become_user: "{{ target_user }}"
  become: true

# at least the submodule related commands need to be executed within the homedir, so we just execute all the stuff in there
- name: Restore files in homedir with state from the repo index
  ansible.builtin.command:
    cmd: "/usr/bin/git --git-dir={{ target_home }}/.cfg.git/ --work-tree={{ target_home }} restore --staged {{ target_home }}"
    chdir: "{{ target_home }}"
  become_user: "{{ target_user }}"
  become: true

- name: Checkout working tree
  ansible.builtin.command:
    cmd: "/usr/bin/git --git-dir={{ target_home }}/.cfg.git/ --work-tree={{ target_home }} checkout {{ target_home }}"
    chdir: "{{ target_home }}"
  become_user: "{{ target_user }}"
  become: true

# Not necessary i think
#- name: Initialise submodules
#  ansible.builtin.command:
#    cmd: "/usr/bin/git --git-dir={{ target_home }}/.cfg.git/ --work-tree={{ target_home }} submodule init"
#    chdir: "{{ target_home }}"
#  become_user: "{{ target_user }}"
#  become: true

- name: Reconfigure prezto submodule to use https temporarily
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.gitmodules"
    # \s* matches any number of whitespace
    regexp: '\s*url\s*=\s*git@github\.com:Atomsoldat\/prezto\.git'
    line: '    url = https://github.com/Atomsoldat/prezto'

- name: Update submodules
  ansible.builtin.command:
    cmd: "/usr/bin/git --git-dir={{ target_home }}/.cfg.git/ --work-tree={{ target_home }} submodule update --init --recursive"
    chdir: "{{ target_home }}"
  become_user: "{{ target_user }}"
  become: true

- name: Reconfigure prezto submodule to use ssh again
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.gitmodules"
    # \s* matches any number of whitespace
    regexp: '\s*url\s*=\s*https:\/\/github\.com\/Atomsoldat\/prezto\.git'
    line: '    url = git@github.com:Atomsoldat/prezto.git'