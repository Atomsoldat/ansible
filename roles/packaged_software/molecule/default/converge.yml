---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    # Skip bundle loading; use a small inline subset to keep tests fast.
    software_bundles: []
    test_generic_packages:
      jq:
      tmux:
      git:
      wget:
    test_special_packages:
      Debian: {}
      Ubuntu: {}
      Archlinux: {}
    test_generic_blacklist: {}
    test_special_blacklist:
      Debian: {}
      Ubuntu: {}
      Archlinux: {}
  roles:
    - role: essential_packages
    - role: repo_setup
    - role: packaged_software
