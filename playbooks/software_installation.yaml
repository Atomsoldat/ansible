---
# Override software_bundles via CLI to select which package domains to install:
#   -e '{"software_bundles": ["base", "development", "communication"]}'
# Available: base, development, media, entertainment, communication, organisation
- name: Desktop PC setup playbook
  hosts: localhost
  remote_user: leon
  gather_facts: true

  vars:
    software_bundles:
      - awesome
      - base
      - cli_tools
      - development
      - entertainment
      - office_software
      - private_networking
      - sysadmin


  roles:
    - ../roles/packaged_software
    - ../roles/nix_setup
    - ../roles/third_party_software
    - ../roles/scripts
